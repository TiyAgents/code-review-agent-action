name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  self-test:
    runs-on: ubuntu-latest
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
    steps:
      - name: Checkout Current Branch
        uses: actions/checkout@v4

      - name: Check LLM_API_KEY
        if: ${{ env.LLM_API_KEY == '' }}
        run: echo "LLM_API_KEY is not set. Skip self-test run."

      - name: Run Action From Current Branch
        if: ${{ env.LLM_API_KEY != '' }}
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Provider 配置（新字段）
          ai_provider: ${{ vars.LLM_PROVIDER_PROTOCOL }}
          api_key: ${{ env.LLM_API_KEY }}
          api_base: ${{ vars.LLM_API_BASE }}

          # [可选] Planner 使用模型；默认 gpt-5.3-codex
          # 可选值：任意可用模型名（字符串）
          planner_model: ${{ vars.PLANNER_MODEL }}

          # [可选] SubAgent 使用模型；默认 gpt-5.3-codex
          # 可选值：任意可用模型名（字符串）
          reviewer_model: ${{ vars.DEFAULT_MODEL }}

          api_base_allowlist: |
            api.openai.com
            zenmux.ai
            opencode.ai
            tokenhub.tencentmaas.com
            api.lkeap.cloud.tencent.com

          include: |
            **/*.js
            **/*.ts
            **/*.md
          exclude: |
            **/node_modules/**
            **/dist/**
          review_language: 简体中文
          coverage_first_round_primary_only: true
          max_rounds: 2
          max_model_calls: 64
          max_files_per_batch: 8
          max_context_chars: 64000
          max_findings: 30
          max_inline_comments: 10
