name: Self Test Current Branch Action

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  self-test:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout Current Branch
        uses: actions/checkout@v4

      - name: Check OPENAI_API_KEY
        if: ${{ env.OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_KEY is not set. Skip self-test run."

      - name: Run Action From Current Branch
        if: ${{ env.OPENAI_API_KEY != '' }}
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ env.OPENAI_API_KEY }}
          openai_api_base: ${{ vars.OPENAI_API_BASE }}
          # [可选] Planner 使用模型；默认 gpt-5.3-codex
          # 可选值：任意可用模型名（字符串）
          planner_model: ${{ vars.PLANNER_OPENAI_MODEL }}

          # [可选] SubAgent 使用模型；默认 gpt-5.3-codex
          # 可选值：任意可用模型名（字符串）
          reviewer_model: ${{ vars.DEFAULT_OPENAI_MODEL }}

          openai_api_base_allowlist: |
            api.openai.com
            zenmux.ai

          include: |
            **/*.js
            **/*.ts
            **/*.md
          exclude: |
            **/node_modules/**
            **/dist/**
          review_language: 简体中文
          coverage_first_round_primary_only: true
          max_rounds: 2
          max_model_calls: 64
          max_files_per_batch: 8
          max_context_chars: 64000
          max_findings: 30
          max_inline_comments: 10
